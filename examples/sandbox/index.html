<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sandbox — @fmcoldays/web-utils</title>
  <!-- CSRF de ejemplo (post-action/modal lo leen si data-*-csrf="true") -->
  <meta name="csrf-token" content="token-de-prueba-123">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #1f2937; }
    h1 { font-size: 1.4rem; }
    section { border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem 1.25rem; margin: 1rem 0; }
    h2 { font-size: 1rem; margin: 0 0 .75rem; }
    button { cursor: pointer; padding: .5rem .9rem; border: 1px solid #d1d5db; border-radius: 8px; background: #f9fafb; font-size: .9rem; }
    button:hover { background: #f3f4f6; }
    .row { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; }
    code { background: #f3f4f6; padding: .1rem .35rem; border-radius: 4px; font-size: .85em; }
    dialog { border: none; border-radius: 14px; padding: 0; width: min(520px, 92vw); box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    dialog::backdrop { background: rgba(0,0,0,.4); }
    #modal-body { padding: 1rem 1.25rem; }
    [data-modal-slot="header"] { padding: 1rem 1.25rem; border-bottom: 1px solid #eee; }
    [data-modal-slot="footer"] { padding: .75rem 1.25rem; border-top: 1px solid #eee; display: flex; justify-content: flex-end; }
    .close-x { position: absolute; top: .5rem; right: .75rem; border: none; background: transparent; font-size: 1.3rem; }
  </style>

  <!-- Peer deps como globales (igual que en tu app por CDN) -->
  <script src="/vendor/jquery.js"></script>
  <script src="/vendor/notiflix-aio.js"></script>
  <script>
    // Shims: en el sandbox no cargamos select2 ni jQuery Validate.
    // El modal los usa solo si existen; aquí los neutralizamos.
    window.jQuery.fn.select2 = window.jQuery.fn.select2 || function () { return this }
    window.jQuery.fn.valid = window.jQuery.fn.valid || function () { return true }
  </script>

  <!-- importmap: resuelve los bare specifiers a los dist locales / shim -->
  <script type="importmap">
  {
    "imports": {
      "@fmcoldays/shared": "/pkg/shared/index.js",
      "notiflix": "/vendor/notiflix.js",
      "@fmcoldays/post-action": "/pkg/post-action/index.js",
      "@fmcoldays/modal": "/pkg/modal/index.js"
    }
  }
  </script>
</head>
<body>
  <h1>Sandbox · @fmcoldays/web-utils</h1>
  <p>Prueba real en navegador con el <code>dist/</code> compilado. Abre la consola para ver errores.</p>

  <section>
    <h2>post-action</h2>
    <div class="row">
      <button data-action-url="/api/echo" data-action-method="POST" data-action-success-msg="¡Guardado! (POST)">
        POST con notify éxito
      </button>

      <button data-action-url="/api/echo" data-action-method="DELETE"
              data-action-confirm="true"
              data-action-confirm-title="¿Eliminar item?"
              data-action-confirm-msg="Esta acción no se puede deshacer.">
        DELETE con confirmación
      </button>

      <button data-action-url="/api/fail" data-action-method="POST">
        Error (mock 400)
      </button>

      <button data-action-url="/api/badge" data-action-method="GET"
              data-action-target="#badge" data-action-silent="true">
        GET → inyecta en target
      </button>

      <button data-action-url="/api/file" data-action-method="GET"
              data-action-download="true" data-action-silent="true">
        Descargar CSV
      </button>
    </div>
    <p style="margin-top:.75rem">Target: <span id="badge"><em>sin actualizar</em></span></p>
  </section>

  <section>
    <h2>modal</h2>
    <div class="row">
      <button data-modal-url="/partial">Abrir modal (GET parcial)</button>
      <button onclick="window.openModal('/partial', { method: 'GET' })">Abrir vía window.openModal()</button>
    </div>
  </section>

  <!-- Estructura que esperan los selectores del modal -->
  <dialog id="dialog-form">
    <button class="close-x" onclick="this.closest('dialog').close()">×</button>
    <div data-modal-slot="header"></div>
    <div data-modal-slot="steps" class="hidden"></div>
    <div id="modal-body"></div>
    <div data-modal-slot="footer"></div>
  </dialog>

  <script type="module">
    import { registerPostAction } from '@fmcoldays/post-action'
    import { registerModal } from '@fmcoldays/modal'

    registerPostAction()
    registerModal()

    console.log('✓ post-action y modal registrados')
  </script>
</body>
</html>
